    :root{
      color-scheme:light;--paper:#e9e8e1;--paper-2:#f3f2ec;--ink:#171916;--muted:#73766e;--hair:rgba(23,25,22,.13);
      --board:#090c0a;--board-2:#101510;--ivory:#f2f0e7;--lime:#c7f07b;--moss:#79a37b;--amber:#d9a965;
      --surface:rgba(247,246,240,.46);--surface-hover:rgba(255,255,255,.67);--surface-active:rgba(255,255,255,.82);--dock:rgba(247,246,240,.55);--control:rgba(255,255,255,.38);--control-hover:#fff;--surface-shadow:rgba(33,36,31,.08);--grain-blend:multiply;
      --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.2,.8,.2,1);--radius:28px;
    }
    html[data-resolved-theme="dark"]{color-scheme:dark;--paper:#11130f;--paper-2:#181b16;--ink:#f0efe7;--muted:#969b8f;--hair:rgba(238,240,229,.13);--surface:rgba(35,39,32,.64);--surface-hover:rgba(48,53,43,.76);--surface-active:rgba(57,63,51,.82);--dock:rgba(31,35,28,.72);--control:rgba(255,255,255,.065);--control-hover:rgba(255,255,255,.11);--surface-shadow:rgba(0,0,0,.25);--grain-blend:soft-light}
    *{box-sizing:border-box}
    html{background:var(--paper);font-family:Geist,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;font-synthesis:none;text-rendering:optimizeLegibility}
    body{margin:0;min-width:320px;height:100svh;color:var(--ink);overflow:hidden;background:radial-gradient(circle at 14% 18%,color-mix(in srgb,var(--paper-2) 78%,transparent),transparent 28%),radial-gradient(circle at 84% 72%,rgba(128,150,111,.12),transparent 32%),var(--paper);transition:background-color .2s ease,color .2s ease}
    html[data-resolved-theme="dark"] body{background:radial-gradient(circle at 16% 12%,rgba(109,137,91,.09),transparent 31%),radial-gradient(circle at 84% 76%,rgba(183,133,76,.07),transparent 34%),var(--paper)}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;mix-blend-mode:var(--grain-blend);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.16'/%3E%3C/svg%3E")}
    button{font:inherit;color:inherit}
    button:focus-visible{outline:2px solid #52683f;outline-offset:3px}
    .app{width:min(1580px,100%);height:100svh;margin:auto;padding:18px clamp(18px,2.3vw,36px);display:flex;flex-direction:column}
    .masthead{height:52px;flex:0 0 52px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--hair);position:relative;z-index:5}
    .brand{display:flex;align-items:center;gap:13px}.brand-mark{width:27px;height:27px;border-radius:50%;border:1px solid var(--hair);display:grid;place-items:center;position:relative}
    .brand-mark::before,.brand-mark::after{content:"";position:absolute;border-radius:50%;border:1px solid currentColor}.brand-mark::before{width:11px;height:11px}.brand-mark::after{width:3px;height:3px;background:currentColor}
    .brand-copy strong{font-size:13px;letter-spacing:.015em;font-weight:650}.brand-copy span{display:block;color:var(--muted);font-size:10px;line-height:1.2;margin-top:2px;letter-spacing:.08em}
    .header-meta{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase}
    .header-meta b{color:var(--ink);font-weight:580;font-variant-numeric:tabular-nums}
    .quiet-button{border:1px solid var(--hair);background:var(--control);border-radius:999px;padding:8px 12px;cursor:pointer;transition:background .2s ease,transform .1s ease,border-color .2s ease}
    .quiet-button:hover{background:var(--control-hover)}.quiet-button:active{transform:scale(.97)}
    .theme-control{display:flex;align-items:center;gap:2px;padding:3px;border:1px solid var(--hair);background:color-mix(in srgb,var(--surface) 78%,transparent);border-radius:999px}.theme-option{min-width:34px;height:25px;border:0;border-radius:999px;background:transparent;color:var(--muted);padding:0 9px;cursor:pointer;font-size:9px;letter-spacing:.03em;transition:background .2s ease,color .2s ease,box-shadow .2s ease}.theme-option:hover{color:var(--ink)}.theme-option[aria-pressed="true"]{background:var(--surface-active);color:var(--ink);box-shadow:0 2px 8px var(--surface-shadow)}
    .atlas{flex:1;min-height:0;display:grid;grid-template-columns:clamp(176px,15vw,214px) minmax(0,1fr);grid-template-rows:minmax(0,1fr) 118px;column-gap:14px;row-gap:12px;padding-top:14px}
    .motion-list{grid-column:1;grid-row:1/3;display:grid;grid-template-rows:repeat(12,minmax(0,1fr));gap:5px;min-height:0;overflow:hidden}
    .motion-button{appearance:none;border:1px solid var(--hair);background:color-mix(in srgb,var(--surface) 78%,transparent);border-radius:11px;padding:6px 11px;text-align:left;cursor:pointer;position:relative;overflow:hidden;min-height:0;transition:transform .24s var(--ease),background .24s ease,border-color .24s ease,box-shadow .24s ease}
    .motion-button::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:2px;border-radius:2px;background:var(--ink);transform:scaleY(0);transition:transform .35s var(--ease)}
    .motion-button:hover{transform:translateX(3px);background:var(--surface-hover);box-shadow:0 7px 20px var(--surface-shadow)}
    .motion-button:active{transform:scale(.975);transition-duration:.09s}
    .motion-button.is-active{background:var(--surface-active);border-color:color-mix(in srgb,var(--ink) 30%,transparent);box-shadow:0 12px 30px var(--surface-shadow)}.motion-button.is-active::before{transform:scaleY(1)}
    .motion-index{position:absolute;right:9px;top:7px;color:#9b9d96;font-size:8px;font-variant-numeric:tabular-nums;letter-spacing:.08em}
    .motion-en{display:block;font-weight:610;font-size:10px;line-height:1.1;letter-spacing:-.012em;padding-right:18px}.motion-zh{display:block;color:var(--muted);font-family:"Noto Sans SC","PingFang SC",sans-serif;font-size:9px;line-height:1.1;margin-top:3px;letter-spacing:.02em}
    .stage-wrap{grid-column:2;grid-row:1;min-width:0;min-height:0;position:relative;perspective:1400px}
    .board{height:100%;min-height:0;border-radius:var(--radius);position:relative;overflow:hidden;color:var(--ivory);isolation:isolate;background:
      radial-gradient(circle at 18% 14%,rgba(90,126,84,.18),transparent 34%),
      radial-gradient(circle at 82% 92%,rgba(176,117,53,.12),transparent 35%),
      linear-gradient(135deg,#111610 0%,#090c0a 52%,#0e120e 100%);
      border:1px solid rgba(255,255,255,.07);box-shadow:0 38px 76px rgba(36,38,32,.22),0 7px 22px rgba(36,38,32,.16),inset 0 1px 0 rgba(255,255,255,.08),inset 0 0 0 1px rgba(0,0,0,.45);transform:translateZ(0)}
    .board::before{content:"";position:absolute;inset:0;z-index:-1;opacity:.11;mix-blend-mode:soft-light;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.75'/%3E%3C/svg%3E")}
    .board::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:inset 0 0 90px rgba(0,0,0,.42);z-index:6}
    .board-grid{position:absolute;inset:0;z-index:-1;opacity:.13;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(to bottom,transparent,black 25%,black 78%,transparent)}
    .board-bar{height:56px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.075);position:relative;z-index:5;background:rgba(8,11,9,.28);backdrop-filter:blur(18px) saturate(125%)}
    .board-status{display:flex;align-items:center;gap:9px;color:rgba(242,240,231,.62);font-size:9px;letter-spacing:.13em;text-transform:uppercase}.status-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 14px rgba(199,240,123,.44)}
    .board-count{font-size:9px;color:rgba(242,240,231,.45);font-variant-numeric:tabular-nums;letter-spacing:.12em}
    .stage{height:calc(100% - 56px);min-height:0;position:relative;display:grid;place-items:center;padding:clamp(20px,3.4vw,52px);overflow:hidden}

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js" crossorigin="anonymous"></script>
  <script>
    const catalog=JSON.parse(document.getElementById('motion-catalog-json').textContent);
    const reducedMotion=matchMedia('(prefers-reduced-motion: reduce)');
    const stage=document.getElementById('stage');
    const boardState=document.getElementById('boardState');
    let activeIndex=0, activeContext=null, canvasFrame=0, typeTimer=0, transitionToken=0;
    const $=(selector,root=document)=>root.querySelector(selector); const $$=(selector,root=document)=>[...root.querySelectorAll(selector)];

    const systemTheme=matchMedia('(prefers-color-scheme: dark)');
    function setTheme(preference,persist=true){const safe=['system','light','dark'].includes(preference)?preference:'system';const resolved=safe==='system'?(systemTheme.matches?'dark':'light'):safe;document.documentElement.dataset.theme=safe;document.documentElement.dataset.resolvedTheme=resolved;$$('[data-theme-option]').forEach(button=>button.setAttribute('aria-pressed',String(button.dataset.themeOption===safe)));if(persist){try{localStorage.setItem('su-motion-theme',safe)}catch{}}}
    $$('[data-theme-option]').forEach(button=>button.addEventListener('click',()=>setTheme(button.dataset.themeOption)));
    systemTheme.addEventListener?.('change',()=>{if(document.documentElement.dataset.theme==='system')setTheme('system',false)});
    setTheme(document.documentElement.dataset.theme||'system',false);

    function buttonMarkup(item,index){return `<button class="motion-button${index===0?' is-active':''}" type="button" data-index="${index}" aria-pressed="${index===0}"><span class="motion-index">${String(index+1).padStart(2,'0')}</span><span class="motion-en">${item.en}</span><span class="motion-zh">${item.zh}</span></button>`}
    function renderRails(){
      $('#motionList').innerHTML=catalog.map(buttonMarkup).join('');
      $$('.motion-button').forEach(btn=>{btn.addEventListener('pointerdown',()=>btn.classList.add('is-pressed'));btn.addEventListener('pointerup',()=>btn.classList.remove('is-pressed'));btn.addEventListener('pointercancel',()=>btn.classList.remove('is-pressed'));btn.addEventListener('click',()=>selectMotion(+btn.dataset.index))});
    }
    function demoMarkup(id){
      const title=`<div class="stage-title"><span class="category">${catalog[activeIndex].category}</span><strong>${catalog[activeIndex].en} · ${catalog[activeIndex].zh}</strong></div>`;
      const demos={
        'fade-blur':`<div class="demo"><div class="hero-copy"><div class="line-wrap"><span>Motion gives</span></div><div class="line-wrap"><span>meaning <em>form.</em></span></div></div></div>`,
        'directional-slide':`<div class="demo"><div class="slide-stack"><div class="slide-card"><i></i><span></span><b></b></div><div class="slide-card"><i></i><span></span><b></b></div><div class="slide-card"><i></i><span></span><b></b></div></div></div>`,
        'mask-reveal':`<div class="demo"><div class="mask-scene"><strong>Reveal<br>the signal.</strong><div class="mask-curtain"></div></div></div>`,
        'scroll-reveal':`<div class="demo"><div class="scroll-window"><div class="scroll-content">${[1,2,3,4].map(()=>'<div class="scroll-row"><i></i><div><b></b><span></span></div></div>').join('')}</div></div></div>`,
        'parallax-depth':`<div class="demo"><div class="parallax-scene"><div class="para-orb one"></div><div class="para-orb two"></div><div class="para-plane"><span>Spatial continuity</span><b>Depth without noise.</b></div></div></div>`,
        'float-levitate':`<div class="demo"><div class="float-scene"><div class="float-chip a">Context · 01</div><div class="float-chip b">Signal · 02</div><div class="float-chip c">Outcome · 03</div><div class="float-core"></div></div></div>`,
        'marquee':`<div class="demo"><div class="marquee-scene"><div class="marquee-track">${['Motion','Continuity','Material','Rhythm','Response','Depth','Motion','Continuity','Material','Rhythm','Response','Depth'].map((x,i)=>`<span class="marquee-pill"><em>${String(i%6+1).padStart(2,'0')}</em>${x}</span>`).join('')}</div><div class="marquee-track reverse">${['反馈 Feedback','空间 Spatial','节奏 Rhythm','状态 State','轨道 Orbit','揭示 Reveal','反馈 Feedback','空间 Spatial','节奏 Rhythm','状态 State','轨道 Orbit','揭示 Reveal'].map((x,i)=>`<span class="marquee-pill"><em>${String(i%6+7).padStart(2,'0')}</em>${x}</span>`).join('')}</div></div></div>`,
        'line-drawing':`<div class="demo"><div class="line-scene"><svg viewBox="0 0 650 270" fill="none"><defs><linearGradient id="signalGradient"><stop stop-color="#7fa27c"/><stop offset=".55" stop-color="#c7f07b"/><stop offset="1" stop-color="#d9a965"/></linearGradient></defs><path class="base" d="M35 205 C125 205 115 68 220 68 S320 215 405 145 S515 38 615 76"/><path class="live" d="M35 205 C125 205 115 68 220 68 S320 215 405 145 S515 38 615 76"/><circle class="node-dot" cx="35" cy="205" r="6"/><circle class="node-dot" cx="220" cy="68" r="6"/><circle class="node-dot" cx="405" cy="145" r="6"/><circle class="node-dot" cx="615" cy="76" r="6"/></svg></div></div>`,
        'number-ticker':`<div class="demo"><div class="ticker-scene"><div class="ticker-value"><span id="tickerValue">0</span><sup>%</sup></div><div class="ticker-meta"><span>Signal <b>+18.4</b></span><span>Confidence <b>High</b></span></div></div></div>`,
        'typewriter':`<div class="demo"><div class="type-scene"><div class="type-eyebrow">System response / 系统响应</div><div class="type-output"><span id="typeOutput"></span><i class="type-caret"></i></div><div class="type-foot">A measured cadence turns text into an event.</div></div></div>`,
        'orbit-network':`<div class="demo"><div class="network-scene"><canvas class="network-canvas"></canvas><div class="network-core">CORE</div></div></div>`,
        'shimmer-sweep':`<div class="demo"><div class="shimmer-card"><i></i><b></b><span></span><span style="width:64%"></span><span class="specular-sweep" aria-hidden="true"></span></div></div>`
      };return demos[id]+title;
    }
    function cleanup(){if(activeContext){activeContext.revert();activeContext=null}cancelAnimationFrame(canvasFrame);clearInterval(typeTimer);stage.onpointermove=null;stage.onpointerleave=null}
    function playMotion(item){
      cleanup();boardState.textContent='Playing / 演示中';
      if(reducedMotion.matches){if(item.id==='typewriter')setupTypewriter(item.profile,true);if(item.id==='orbit-network')setupNetwork(item.profile,true);boardState.textContent='Reduced motion / 简化动效';return}
      activeContext=gsap.context(()=>{
        const id=item.id,p=item.profile,seconds=value=>value/1000;
        if(id==='fade-blur')gsap.fromTo('.hero-copy span',{y:p.from.translateYPercent+'%',opacity:p.from.opacity,filter:'blur('+p.from.blurPx+'px)'},{y:p.to.translateYPercent+'%',opacity:p.to.opacity,filter:'blur('+p.to.blurPx+'px)',duration:seconds(p.durationMs),stagger:seconds(p.staggerMs),ease:p.engineEase});
        if(id==='directional-slide')gsap.fromTo('.slide-card',{x:i=>(i%2?1:-1)*p.distancePx,opacity:p.from.opacity,filter:'blur('+p.from.blurPx+'px)'},{x:0,opacity:p.to.opacity,filter:'blur('+p.to.blurPx+'px)',duration:seconds(p.durationMs),stagger:seconds(p.staggerMs),ease:p.engineEase});
        if(id==='mask-reveal'){gsap.fromTo('.mask-curtain',{scaleX:p.mask.fromScaleX,transformOrigin:p.mask.origin},{scaleX:p.mask.toScaleX,duration:seconds(p.durationMs),ease:p.engineEase});gsap.fromTo('.mask-scene strong',{y:p.subject.fromYpx,opacity:p.subject.fromOpacity},{y:0,opacity:1,duration:seconds(p.subject.durationMs),delay:seconds(p.subject.delayMs),ease:'power3.out'})}
        if(id==='scroll-reveal'){gsap.fromTo('.scroll-content',{y:0},{y:p.showcaseScene.travelYpx,duration:seconds(p.showcaseScene.durationMs),ease:p.showcaseScene.engineEase});gsap.fromTo('.scroll-row',{opacity:p.from.opacity,scale:p.from.scale},{opacity:p.to.opacity,scale:p.to.scale,duration:seconds(p.durationMs),stagger:seconds(p.staggerMs),ease:p.engineEase})}
        if(id==='parallax-depth'){const tl=gsap.timeline({repeat:p.repeat,yoyo:p.yoyo}),d=seconds(p.durationMs),l=p.layers;tl.to('.para-orb.one',{x:l.foreground.xPx,y:l.foreground.yPx,duration:d,ease:p.engineEase},0).to('.para-orb.two',{x:l.background.xPx,y:l.background.yPx,duration:d,ease:p.engineEase},0).to('.para-plane',{x:l.subject.xPx,y:l.subject.yPx,duration:d,ease:p.engineEase},0)}
        if(id==='float-levitate'){const c=p.core,ch=p.chips;gsap.fromTo('.float-core',{y:c.fromYpx,rotate:c.fromRotateDeg},{y:c.toYpx,rotate:c.toRotateDeg,duration:seconds(p.durationMs),repeat:-1,yoyo:true,ease:p.engineEase});gsap.to('.float-chip',{y:i=>ch.offsets[i].yPx,x:i=>ch.offsets[i].xPx,duration:i=>seconds(ch.baseDurationMs+i*ch.durationStepMs),repeat:-1,yoyo:true,ease:p.engineEase,stagger:seconds(ch.staggerMs)})}
        if(id==='marquee'){gsap.fromTo('.marquee-track',{x:p.primary.fromXpx},{x:p.primary.toXpx,duration:seconds(p.durationMs),repeat:-1,ease:p.engineEase});gsap.fromTo('.marquee-track.reverse',{x:p.reverse.fromXpx},{x:p.reverse.toXpx,duration:seconds(p.reverse.durationMs),repeat:-1,ease:p.engineEase})}
        if(id==='line-drawing'){const path=$('.live'),length=path.getTotalLength();gsap.set(path,{strokeDasharray:length,strokeDashoffset:length});gsap.to(path,{strokeDashoffset:0,duration:seconds(p.durationMs),ease:p.engineEase});gsap.fromTo('.node-dot',{scale:0,transformOrigin:'center'},{scale:1,duration:seconds(p.node.durationMs),stagger:seconds(p.node.staggerMs),ease:p.node.engineEase})}
        if(id==='number-ticker'){const counter={value:p.example.from};gsap.to(counter,{value:p.example.to,duration:seconds(p.durationMs),ease:p.engineEase,onUpdate:()=>$('#tickerValue').textContent=counter.value.toFixed(p.example.decimals)})}
        if(id==='shimmer-sweep'){const card=$('.shimmer-card'),sweep=$('.specular-sweep'),e=p.entrance,s=p.sweep,surface=p.surface;gsap.fromTo(card,{y:e.fromYpx,opacity:e.fromOpacity,filter:'brightness('+e.fromBrightness+')'},{y:0,opacity:1,filter:'brightness(1)',duration:seconds(e.durationMs),ease:'power3.out'});const loop=gsap.timeline({repeat:-1,repeatDelay:seconds(p.repeatDelayMs),delay:seconds(p.delayMs)});loop.fromTo(sweep,{xPercent:s.fromXPercent},{xPercent:s.toXPercent,duration:seconds(p.durationMs),ease:p.engineEase},0).to(card,{filter:'brightness('+surface.peakBrightness+')',borderColor:'rgba(255,255,255,.25)',duration:seconds(surface.pulseDurationMs),yoyo:true,repeat:1,ease:'sine.inOut'},.3)}
      },stage);
      if(item.id==='typewriter')setupTypewriter(item.profile);if(item.id==='orbit-network')setupNetwork(item.profile);
      setTimeout(()=>{if(catalog[activeIndex].id===item.id)boardState.textContent=(['float-levitate','marquee','parallax-depth','orbit-network','shimmer-sweep'].includes(item.id)?'Live / 持续运行':'Complete / 已完成')},item.profile.completionDelayMs);
    }
    function setupTypewriter(profile,staticOnly=false){const text='Design should feel inevitable.\n设计应当自然发生。';const out=$('#typeOutput');if(staticOnly){out.innerHTML=text.replace('\n','<br>');return}let i=0;typeTimer=setInterval(()=>{out.innerHTML=(text.slice(0,++i).replace('\n','<br>'));if(i>=text.length){clearInterval(typeTimer);boardState.textContent='Complete / 已完成'}},profile.unitMs)}
    function setupNetwork(profile,staticOnly=false){const canvas=$('.network-canvas'),ctx=canvas.getContext('2d'),scene=canvas.parentElement,dpr=Math.min(devicePixelRatio,profile.maxDevicePixelRatio),nodes=Array.from({length:profile.nodeCount},(_,i)=>({a:i/profile.nodeCount*Math.PI*2,r:profile.baseRadiusPx+(i%profile.radiusSteps)*profile.radiusStepPx,s:profile.speedBase+(i%profile.speedSteps)*profile.speedStep,size:i%6===0?2.2:1.2}));const resize=()=>{const r=scene.getBoundingClientRect();canvas.width=r.width*dpr;canvas.height=r.height*dpr;canvas.style.width=r.width+'px';canvas.style.height=r.height+'px'};resize();const draw=t=>{const w=canvas.width/dpr,h=canvas.height/dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);const points=nodes.map((n,i)=>({x:w/2+Math.cos(n.a+t*n.s)*n.r*(1+.08*Math.sin(t*.0004+i)),y:h/2+Math.sin(n.a+t*n.s)*n.r*.62,size:n.size}));ctx.lineWidth=.65;for(let i=0;i<points.length;i++)for(let j=i+1;j<points.length;j++){const a=points[i],b=points[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<profile.connectionThresholdPx){ctx.strokeStyle='rgba(199,240,123,'+((1-d/profile.connectionThresholdPx)*.16)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}}points.forEach((p,i)=>{ctx.fillStyle=i%6===0?'rgba(199,240,123,.85)':'rgba(242,240,231,.38)';ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});if(!staticOnly)canvasFrame=requestAnimationFrame(draw)};draw(0)}
    async function selectMotion(index,force=false){
      const token=++transitionToken;activeIndex=index;const item=catalog[index];$$('.motion-button').forEach(btn=>{const active=+btn.dataset.index===index;btn.classList.toggle('is-active',active);btn.setAttribute('aria-pressed',active)});updateDock(item,index);
      cleanup();const old=stage.firstElementChild;if(old&&!force&&!reducedMotion.matches){const exit=stage.animate([{opacity:1,transform:'scale(1)',filter:'blur(0px)'},{opacity:.18,transform:'scale(.992)',filter:'blur(5px)'}],{duration:135,easing:'cubic-bezier(.4,0,1,1)',fill:'forwards'});await exit.finished.catch(()=>{});if(token!==transitionToken)return}
      stage.getAnimations().forEach(a=>a.cancel());stage.innerHTML=demoMarkup(item.id);if(!reducedMotion.matches)stage.animate([{opacity:.3,transform:'scale(.994)',filter:'blur(4px)'},{opacity:1,transform:'scale(1)',filter:'blur(0px)'}],{duration:420,easing:'cubic-bezier(.22,1,.36,1)',fill:'both'});playMotion(item);
      const mobile=$(`#motionList .motion-button[data-index="${index}"]`);if(innerWidth<=820)mobile?.scrollIntoView({behavior:reducedMotion.matches?'auto':'smooth',inline:'center',block:'nearest'});
    }
    function updateDock(item,index){$('#dockEn').textContent=item.en;$('#dockZh').textContent=item.zh;$('#dockDescription').textContent=item.description;$('#dockCategory').textContent=item.category;$('#dockTiming').textContent=`${item.duration} · ${item.easing}`;$('#dockSources').textContent=item.sources.join(' · ');$('#boardCount').textContent=`${String(index+1).padStart(2,'0')} / ${String(catalog.length).padStart(2,'0')}`}
    function exportItem(item){return{...item,index:activeIndex+1,reusable:{properties:['transform','opacity'],reducedMotion:'crossfade',restart:'interrupt current timeline and replay from presentation state'}}}
    async function copyText(text,message){try{await navigator.clipboard.writeText(text)}catch{const area=document.createElement('textarea');area.value=text;document.body.append(area);area.select();document.execCommand('copy');area.remove()}const toast=$('#toast');toast.textContent=message;toast.classList.add('show');clearTimeout(toast._timer);toast._timer=setTimeout(()=>toast.classList.remove('show'),1600)}
    $('#copyCatalog').addEventListener('click',()=>copyText(JSON.stringify(catalog,null,2),'完整 Motion JSON 已复制'));$('#copyMotion').addEventListener('click',()=>copyText(JSON.stringify(exportItem(catalog[activeIndex]),null,2),'当前 Motion 参数已复制'));$('#replay').addEventListener('click',()=>selectMotion(activeIndex,true));
    addEventListener('keydown',e=>{if(['ArrowRight','ArrowDown'].includes(e.key)){e.preventDefault();selectMotion((activeIndex+1)%catalog.length)}if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();selectMotion((activeIndex-1+catalog.length)%catalog.length)}if(e.key===' '&&e.target===document.body){e.preventDefault();selectMotion(activeIndex,true)}});
    reducedMotion.addEventListener?.('change',()=>selectMotion(activeIndex,true));renderRails();selectMotion(0,true);
  </script>
